<!DOCTYPE html>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <meta name="mobile-web-app-capable" content="yes">

  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <script>
    if ('serviceWorker' in navigator) {
      window.__coinrealmPwaSwRegistered = true;
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function (registration) {
            console.log('[pwa] Service Worker 注册成功:', registration.scope);
          })
          .catch(function (err) {
            console.warn('[pwa] Service Worker 注册失败:', err);
          });
      });
    }
  </script>
  <script>
    (function () {
      var path = location.pathname || '';
      if (/mobile\.html$/i.test(path)) return;
      if (/[?&]mobile=1(?:&|$)/.test(location.search)) return;
      var ua = navigator.userAgent || '';
      var isDesktop = !/Mobi|Android|iPhone|iPad|iPod/i.test(ua)
        && !(window.matchMedia && window.matchMedia('(max-width: 768px)').matches);
      if (isDesktop) {
        location.replace('index.html' + location.search + location.hash);
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.SUPABASE_URL = 'https://ocpuksssvnueknhfcfco.supabase.co';
    window.SUPABASE_ANON_KEY = 'sb_publishable_XXFWPmwswaH4ESVjcBSIfg_6X7h7S4a';
    window.supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  </script>

</head>
<body class="mobile-app">
  <div id="mobile-login-screen" class="mobile-login-screen hidden" aria-hidden="true">
    <div class="mobile-login-inner">
      <div class="mobile-login-logo" aria-hidden="true">C</div>
      <h1 class="mobile-login-title">CoinRealm</h1>
      <p class="mobile-login-subtitle" id="mobile-login-subtitle">Web3 任务与空投平台</p>
      <button type="button" id="mobile-google-btn" class="mobile-btn mobile-btn-outline">Google 登录</button>
      <button type="button" id="mobile-wallet-btn" class="mobile-btn mobile-btn-primary" data-i18n="connectWallet">连接钱包</button>
      <p class="mobile-login-legal">
        登录即表示同意
        <a href="#" class="mobile-link">用户协议</a>
        与
        <a href="#" class="mobile-link">隐私政策</a>
      </p>
    </div>
  </div>

  <header id="mobile-header" class="mobile-header">
    <button type="button" id="mobile-back-btn" class="mobile-header-btn mobile-back-btn hidden" aria-label="返回">←</button>
    <h1 id="mobile-page-title" class="mobile-header-title">任务中心</h1>
    <button type="button" id="mobile-lang-btn" class="mobile-header-btn mobile-lang-btn" aria-label="切换语言" data-i18n="langToggle">EN</button>
  </header>

  <div id="auth-area" class="mobile-auth-hidden" aria-hidden="true"></div>

  <main id="mobile-scroll" class="mobile-scroll">
    <div id="app-content" class="app-content mobile-app-content">
      <div id="mobile-content-loading" class="mobile-content-loading">
        <div class="mobile-spinner"></div>
        <p data-i18n="loading">加载中...</p>
      </div>
    </div>
  </main>

  <nav id="mobile-tab-bar" class="mobile-tab-bar" aria-label="主导航">
    <button type="button" class="mobile-tab active" data-route="home">
      <span class="mobile-tab-icon" aria-hidden="true">🏠</span>
      <span class="mobile-tab-label" data-i18n="nav_home">首页</span>
    </button>
    <button type="button" class="mobile-tab" data-route="my-tasks">
      <span class="mobile-tab-icon" aria-hidden="true">📋</span>
      <span class="mobile-tab-label" data-mobile-page="my-tasks">我的任务</span>
    </button>
    <button type="button" class="mobile-tab mobile-tab-publish" data-route="create-task">
      <span class="mobile-tab-publish-btn" aria-hidden="true">➕</span>
      <span class="mobile-tab-label" data-mobile-page="create-task">发布任务</span>
    </button>
    <button type="button" class="mobile-tab" data-route="invite">
      <span class="mobile-tab-icon" aria-hidden="true">🎁</span>
      <span class="mobile-tab-label" data-i18n="nav_airdrop">空投</span>
    </button>
    <button type="button" class="mobile-tab" data-route="profile">
      <span class="mobile-tab-icon" aria-hidden="true">👤</span>
      <span class="mobile-tab-label" data-mobile-page="profile">个人中心</span>
    </button>
  </nav>

  <script>
    (function () {
      var MOBILE_SCRIPTS = [
        'js/i18n.js',
        'auth.js',
        'js/pages/leaderboard.js',
        'js/pages/dividends.js',
        'js/pages/invite.js',
        'js/pages/admin.js',
        'js/pages/home.js',
        'js/pages/publisher.js',
        'js/pages/task-detail.js',
        'js/pages/create-task.js',
        'js/pages/submit-task.js',
        'js/pages/review.js',
        'js/pages/profile.js',
        'js/pages/my-tasks.js',
        'app.js?v=20260702',
        'js/mobile.js'
      ];

      function showBootstrapError(message) {
        var mount = document.getElementById('app-content');
        if (!mount) return;
        mount.innerHTML =
          '<div class="mobile-error-state">' +
            '<p>页面加载失败，请刷新重试</p>' +
            '<p style="font-size:12px;color:#94a3b8;margin-top:8px;">' + (message || '') + '</p>' +
          '</div>';
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement('script');
          s.src = src;
          s.async = false;
          s.onload = function () { resolve(); };
          s.onerror = function () { reject(new Error('脚本加载失败: ' + src)); };
          document.body.appendChild(s);
        });
      }

      function loadScriptsSequential(list) {
        return list.reduce(function (chain, src) {
          return chain.then(function () { return loadScript(src); });
        }, Promise.resolve());
      }

      function bootstrapAppContent() {
        return fetch('index.html', { credentials: 'same-origin' })
          .then(function (res) {
            if (!res.ok) throw new Error('index.html HTTP ' + res.status);
            return res.text();
          })
          .then(function (html) {
            var doc = new DOMParser().parseFromString(html, 'text/html');
            var src = doc.getElementById('app-content');
            var mount = document.getElementById('app-content');
            if (!src || !mount) throw new Error('未找到 #app-content');
            mount.innerHTML = src.innerHTML;
            if (!document.getElementById('home-page')) {
              throw new Error('页面内容不完整');
            }
          });
      }

      function startMobileApp() {
        bootstrapAppContent()
          .catch(function (err) {
            console.error('[mobile] 加载 index.html 内容失败:', err);
            showBootstrapError(err && err.message ? err.message : String(err));
            throw err;
          })
          .then(function () {
            return loadScriptsSequential(MOBILE_SCRIPTS);
          })
          .catch(function (err) {
            console.error('[mobile] 初始化失败:', err);
            if (!document.getElementById('home-page')) {
              showBootstrapError(err && err.message ? err.message : '初始化失败');
            }
          });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startMobileApp);
      } else {
        startMobileApp();
      }
    })();
  </script>
</body>
</html>
