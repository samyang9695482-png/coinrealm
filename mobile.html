  <script>
    (function bootstrapAppContent() {
      var mount = document.getElementById('app-content');
      if (!mount) return;
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'index.html', false);
        xhr.send(null);
        if (xhr.status >= 200 && xhr.status < 300) {
          var parser = new DOMParser();
          var doc = parser.parseFromString(xhr.responseText, 'text/html');
          var src = doc.getElementById('app-content');
          if (src) {
            mount.innerHTML = src.innerHTML;
          }
        }
      } catch (err) {
        console.error('[mobile] 加载 index.html 内容失败:', err);
        mount.innerHTML = '<div class="mobile-error-state"><p>页面加载失败，请刷新重试</p></div>';
      }
    })();
  </script>
  <script>
    (function () {

  <script>
    (function () {
      var banner = document.createElement('div');
      banner.id = 'coinrealm-install-banner';
      banner.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:9999;background:#6366f1;color:#fff;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -2px 10px rgba(0,0,0,.15);font-size:14px;';
      banner.innerHTML = '<span>📱 将 CoinRealm 添加到桌面，体验更好！</span><div style="display:flex;align-items:center;gap:8px;"><button type="button" id="coinrealm-install-accept" style="background:#fff;color:#6366f1;border:none;border-radius:999px;padding:7px 12px;font-weight:700;cursor:pointer;">立即安装</button><button type="button" id="coinrealm-install-close" style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:16px;">×</button></div>';
      var installPrompt = null;
      var dismissedUntil = parseInt(localStorage.getItem('coinrealm-install-dismiss-until') || '0', 10);
      var now = Date.now();
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      if (isStandalone || /android/i.test(navigator.userAgent) === false || now < dismissedUntil) {
        return;
      }
      document.body.appendChild(banner);
      var closeBtn = document.getElementById('coinrealm-install-close');
      var acceptBtn = document.getElementById('coinrealm-install-accept');
      function dismissBanner() {
        localStorage.setItem('coinrealm-install-dismiss-until', String(Date.now() + 7 * 24 * 60 * 60 * 1000));
        banner.remove();
      }
      closeBtn.addEventListener('click', dismissBanner);
      acceptBtn.addEventListener('click', function () {
        if (installPrompt) {
          installPrompt.prompt();
        }
        dismissBanner();
      });
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        installPrompt = event;
      });
    })();
  </script>
  <script src="js/i18n.js?v=20260717"></script>
  <script>
    (function () {
      var hash = window.location.hash || '';
      if (hash.indexOf('access_token') === -1 && hash.indexOf('refresh_token') === -1) {
        return;
      }
      if (!window.supabase || !window.supabase.auth || typeof window.supabase.auth.setSession !== 'function') {
        return;
      }
      var params = {};
      hash.replace(/^#/, '').split('&').forEach(function (pair) {
        var index = pair.indexOf('=');
        if (index === -1) return;
        var key = decodeURIComponent(pair.slice(0, index));
        var value = decodeURIComponent(pair.slice(index + 1));
        params[key] = value;
      });
      window.supabase.auth.setSession({
        access_token: params.access_token || '',
        refresh_token: params.refresh_token || ''
      }).then(function () {
        return window.supabase.auth.getSession();
      }).catch(function (error) {
        console.warn('[mobile] Supabase OAuth callback handling failed:', error);
      }).finally(function () {
        try {
          if (window.history && window.history.replaceState) {
            window.history.replaceState(window.history.state, document.title, window.location.pathname + window.location.search);
          }
        } catch (err) {
          console.warn('[mobile] 清理 OAuth hash 失败:', err);
        }
      });
    })();
  </script>
